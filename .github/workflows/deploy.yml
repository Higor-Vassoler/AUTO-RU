name: Deploy Docker Images

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push do Backend
        uses: docker/build-push-action@v6
        with:
          context: ./back-end
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/auto-ru-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/auto-ru-backend:${{ github.sha }}

      - name: Build e Push do Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front-end
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/auto-ru-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/auto-ru-frontend:${{ github.sha }}