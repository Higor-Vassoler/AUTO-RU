<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Cadastro de Produtos</title>
  </head>
  <body>
    <form>
      <fieldset>
        <div class="topo">
          <legend class="titulo">Dados Basicos</legend>
          <p>Preencha as informações para cadastrar ou editar o produto.</p>
        </div>

        <div class="coluna_pai">
          <div class="coluna_filha">
            <h1>Identificação</h1>

            <div class="campo">
              <label for="id_produto">Código/Id:</label>
              <input
                type="text"
                id="id_produto"
                name="id"
                pattern="[0-9]{13}"
                placeholder="789 123456 789 0"
                required
              />
            </div>

            <div class="campo">
              <label for="nome">Nome:</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Nome do produto"
                required
              />
            </div>

            <div class="campo">
              <label for="venda">Preço de Venda:</label>
              <input
                type="text"
                id="venda"
                name="venda"
                inputmode="decimal"
                pattern="[0-9]+,[0-9]{2}"
                placeholder="R$0,00"
                required
              />
              <small>Formato: 0,00</small>
            </div>
          </div>

          <div class="coluna_filha">
            <h1>Detalhes</h1>

            <div class="campo">
              <label for="categoria">Categoria</label>
              <select id="categoria" name="categoria" required>
                <option value="">Selecione uma opção</option>
                <option value="bebida">Bebida</option>
                <option value="comida">Comida</option>
                <option value="doces">Doces</option>
                <option value="ficha">Ficha</option>
              </select>
            </div>

            <div class="campo">
              <label for="estoque">Quantidade</label>
              <input
                type="number"
                id="estoque"
                name="estoque"
                min="0"
                placeholder="Quantidade no estoque"
                required
              />
            </div>

            <div class="campo">
              <label for="descricao">Descrição</label>
              <textarea
                id="descricao"
                name="descricao"
                placeholder="Escreva aqui"
                required
              ></textarea>
            </div>
          </div>
        </div>

        <div class="botoes">
          <button type="reset" id="cancelar">Cancelar</button>
          <button type="submit" id="salvar" name="salvar" value="salvo">
            Salvar
          </button>
        </div>
      </fieldset>
    </form>
  </body>
</html>
