services:
  mysql:
    image: mysql:8.4
    container_name: auto-ru-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASS: root
      MYSQL_NAME: auto_ru
      MYSQL_USER: usuario
      MYSQL_PASS: senha
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: auto-ru-backend
    restart: unless-stopped
    env_file:
      - ./back-end/.env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASS}
      DB_NAME: ${MYSQL_NAME}
    ports:
      - "5000:5000"
    volumes:
      - ./back-end:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx sequelize-cli db:migrate && npm run dev"

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: auto-ru-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  mysql_data:
