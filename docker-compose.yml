services:
  mysql:
    image: mysql:8.4

    container_name: auto-ru-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auto_ru
      MYSQL_USER: usuario
      MYSQL_PASSWORD: senha

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile

    container_name: auto-ru-backend

    restart: unless-stopped

    env_file:
      - ./back-end/.env

    ports:
      - "5000:5000"

    volumes:
      - ./back-end:/app
      - /app/node_modules

    depends_on:
      mysql:
        condition: service_healthy

    command: sh -c "npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all && npm run dev"

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile

    container_name: auto-ru-frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    volumes:
      - ./front-end:/app
      - /app/node_modules

    command: npm run dev -- --host

volumes:
  mysql_data:
